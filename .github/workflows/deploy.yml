name: Deploy Joinery Stack

on:
  workflow_run:
    workflows:
      - "Build and Push Server Image"
      - "Build and Push Web Image"
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      id-token: write

    env:
      SERVER_ARN: ${{ vars.APPRUNNER_SERVER_ARN }}
      WEB_ARN: ${{ vars.APPRUNNER_WEB_ARN }}
      SERVER_URL: ${{ vars.APPRUNNER_SERVER_URL }}
      WEB_URL: ${{ vars.APPRUNNER_WEB_URL }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Determine which services to check
        id: services
        run: |
          TRIGGER="${{ github.event.workflow_run.name }}"
          if [[ "$TRIGGER" == "Build and Push Server Image" ]]; then
            echo "check_server=true" >> "$GITHUB_OUTPUT"
            echo "check_web=false" >> "$GITHUB_OUTPUT"
            echo "Triggered by server image build"
          elif [[ "$TRIGGER" == "Build and Push Web Image" ]]; then
            echo "check_server=false" >> "$GITHUB_OUTPUT"
            echo "check_web=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by web image build"
          else
            echo "check_server=true" >> "$GITHUB_OUTPUT"
            echo "check_web=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — checking both services"
          fi

      - name: Wait for App Runner deployment (server)
        if: steps.services.outputs.check_server == 'true'
        run: |
          echo "Waiting for App Runner to deploy joinery-server..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVER_ARN" \
              --query 'Service.Status' --output text)
            echo "  Attempt $i/30: Status = $STATUS"
            if [[ "$STATUS" == "RUNNING" ]]; then
              echo "Server service is running."
              break
            elif [[ "$STATUS" == *"FAILED"* ]]; then
              echo "::error::Server deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done
          if [[ "$STATUS" != "RUNNING" ]]; then
            echo "::error::Timed out waiting for server deployment"
            exit 1
          fi

      - name: Wait for App Runner deployment (web)
        if: steps.services.outputs.check_web == 'true'
        run: |
          echo "Waiting for App Runner to deploy joinery-web..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$WEB_ARN" \
              --query 'Service.Status' --output text)
            echo "  Attempt $i/30: Status = $STATUS"
            if [[ "$STATUS" == "RUNNING" ]]; then
              echo "Web service is running."
              break
            elif [[ "$STATUS" == *"FAILED"* ]]; then
              echo "::error::Web deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done
          if [[ "$STATUS" != "RUNNING" ]]; then
            echo "::error::Timed out waiting for web deployment"
            exit 1
          fi

      - name: Health check (server)
        if: steps.services.outputs.check_server == 'true'
        run: |
          echo "Running health check on server API..."
          HTTP_STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 10 "$SERVER_URL/api/health")
          if [[ "$HTTP_STATUS" -eq 200 ]]; then
            echo "Server health check passed (HTTP $HTTP_STATUS)"
            cat /tmp/health.json
          else
            echo "::error::Server health check failed (HTTP $HTTP_STATUS)"
            cat /tmp/health.json || true
            exit 1
          fi

      - name: Health check (web)
        if: steps.services.outputs.check_web == 'true'
        run: |
          echo "Running health check on web frontend..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "$WEB_URL/")
          if [[ "$HTTP_STATUS" -eq 200 ]]; then
            echo "Web health check passed (HTTP $HTTP_STATUS)"
          else
            echo "::error::Web health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** ${{ github.event.workflow_run.name || 'Manual dispatch' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$CHECK_SERVER" == "true" ]]; then
            SERVER_STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVER_ARN" \
              --query 'Service.Status' --output text 2>/dev/null || echo "UNKNOWN")
            echo "| Server API | $SERVER_URL | $SERVER_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$CHECK_WEB" == "true" ]]; then
            WEB_STATUS=$(aws apprunner describe-service \
              --service-arn "$WEB_ARN" \
              --query 'Service.Status' --output text 2>/dev/null || echo "UNKNOWN")
            echo "| Web Frontend | $WEB_URL | $WEB_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          CHECK_SERVER: ${{ steps.services.outputs.check_server }}
          CHECK_WEB: ${{ steps.services.outputs.check_web }}
