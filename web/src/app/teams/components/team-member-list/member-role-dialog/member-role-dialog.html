<h2 mat-dialog-title>Change Role for {{ data.member.name }}</h2>

<mat-dialog-content>
  <div class="role-form">
    <p class="current-role">
      Current role: <strong>{{ data.member.role | titlecase }}</strong>
    </p>

    <mat-radio-group [(ngModel)]="selectedRole" class="role-group">
      <mat-radio-button
        *ngFor="let role of roleOptions; trackBy: trackByRoleOption"
        [value]="role.value"
        class="role-option"
      >
        <div class="role-label">
          <span class="role-name">{{ role.label }}</span>
          <span class="role-desc">{{ role.description }}</span>
        </div>
      </mat-radio-button>
    </mat-radio-group>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button
    mat-raised-button
    color="primary"
    (click)="save()"
  >
    Update Role
  </button>
</mat-dialog-actions>
